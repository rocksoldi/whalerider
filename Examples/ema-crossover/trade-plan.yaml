NAME: EMA_CROSSSOVER_TRADE_PLAN
SIDE: LONG
RISK:
  HOLDING_MAX_PERIOD: 240D
  ATR_INTERVAL: DAY
  ATR_LOOKBACK: 14
  STOP_LOSS_ATR: 3
  TAKE_PROFIT_ATR: 1.2
  ENTER_LIMIT_ATR: 0.0
  
SEGMENT:

  MARKET_INDICES:
    - NASDAQ100
  EXCLUDE_TICKERS:
    - AXON  
INDICATORS:
  -
    NAME: PRICE
    DOMAIN: CANDLE
    INTERVAL: FIFTEEN_MINUTES
    MEASUREMENT: Close
  -
    NAME: PIVOT_S2
    DOMAIN: CANDLE
    INTERVAL: DAY
    MEASUREMENT: Close
    STEPS:
      - 
        TYPE: PIVOT
        LOOKBACK: 60
        ARGS:
          TYPE: Standard
          WINDOW_SIZE: MONTH
          LEVEL: S2        
SIGNALS:
  -
    NAME: PRICE_GT_S2
    IS: PRICE > PIVOT_S2
  -
    NAME: PRICE_LT_S2
    IS: PRICE < PIVOT_S2
CRITERIA:
  ENTER:
    IF: PRICE_GT_S2
    NEXT:
      -
        IF: PRICE_LT_S2